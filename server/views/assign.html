<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATEM Tally — Assign</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    h2 { font-size: 0.8em; color: #888; text-transform: uppercase;
         letter-spacing: 0.07em; margin: 28px 0 8px; }
    .bridge-warn {
      background: #c0392b; color: #fff;
      padding: 8px 14px; border-radius: 4px;
      margin-bottom: 14px; display: none;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 3px;
      background: #2a2a2a; border: 1px solid #444; color: #ccc;
      padding: 2px 8px 2px 10px; border-radius: 20px;
      font-size: 0.82em; margin: 2px 3px 2px 0; vertical-align: middle;
    }
    .chip button {
      background: none; border: none; color: #666;
      cursor: pointer; padding: 0 0 0 2px; font-size: 1em; line-height: 1;
    }
    .chip button:hover { color: #fff; }
    .add-sel {
      font-size: 0.82em; padding: 2px 6px;
      background: #1a1a1a; color: #666; border: 1px dashed #444;
      border-radius: 20px; cursor: pointer; vertical-align: middle;
    }
    .identify-btn {
      background: #333; color: #ccc; border: none;
      padding: 3px 9px; border-radius: 3px; cursor: pointer; font-size: 0.82em;
    }
    .identify-btn:hover { background: #555; color: #fff; }
    .remove-device-btn {
      background: none; border: none; color: #555;
      cursor: pointer; font-size: 1em; padding: 2px 5px; line-height: 1;
      border-radius: 3px;
    }
    .remove-device-btn:hover { color: #e74c3c; background: #2a1a1a; }
    details summary { cursor: pointer; color: #666; font-size: 0.88em; padding: 8px 0; }
    code { font-size: 0.88em; color: #999; }
    td { vertical-align: middle; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/assign" class="active">Assign</a>
    <a href="/settings">Settings</a>
  </nav>
  <h1>Assign</h1>

  <div class="bridge-warn" id="bridge-warn">
    ⚠ More than one unit is set to Bridge — only one bridge is supported.
  </div>

  <h2>Devices</h2>
  <table>
    <thead><tr>
      <th>MAC</th><th>Unit ID</th><th>Role</th><th>Status</th><th></th>
    </tr></thead>
    <tbody id="devices-tbody"></tbody>
  </table>

  <h2>Camera Inputs</h2>
  <table>
    <thead><tr>
      <th style="width:36px">#</th>
      <th style="width:180px">Name</th>
      <th>Assigned Units</th>
    </tr></thead>
    <tbody id="inputs-tbody"></tbody>
  </table>

  <details id="other-details" style="display:none">
    <summary>Other inputs</summary>
    <table style="width:100%; margin-top:4px">
      <tbody id="other-tbody"></tbody>
    </table>
  </details>

  <div style="margin-top:20px">
    <button id="save-btn">Save Assignments</button>
    <span class="saved-msg" id="saved-msg" style="display:none">Saved ✓</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
    let units = []
    let inputNames = {}
    let inputMap = null

    socket.on('units', u => {
      units = u
      if (inputMap === null) {
        inputMap = buildInputMapFromUnits(u)
      } else {
        // Prune unitIds no longer present so removals from other tabs propagate
        const activeIds = new Set(u.filter(x => x.unitId).map(x => x.unitId))
        for (const uids of Object.values(inputMap)) {
          for (let i = uids.length - 1; i >= 0; i--) {
            if (!activeIds.has(uids[i])) uids.splice(i, 1)
          }
        }
      }
      render()
    })
    socket.on('inputNames', n => { inputNames = n; render() })

    const shortMac = mac => mac ? mac.slice(-8) : '—'
    const ago = ts => ts ? Math.round((Date.now() - ts) / 1000) + 's ago' : 'never'

    function buildInputMapFromUnits(u) {
      const map = {}
      for (const unit of u) {
        if (!unit.unitId || !unit.atemInput) continue
        if (!map[unit.atemInput]) map[unit.atemInput] = []
        if (!map[unit.atemInput].includes(unit.unitId)) map[unit.atemInput].push(unit.unitId)
      }
      return map
    }

    function addToInput(inputNum, unitId) {
      for (const uids of Object.values(inputMap)) {
        const i = uids.indexOf(unitId)
        if (i >= 0) uids.splice(i, 1)
      }
      if (!inputMap[inputNum]) inputMap[inputNum] = []
      inputMap[inputNum].push(unitId)
      render()
    }

    function removeFromInput(inputNum, unitId) {
      if (inputMap[inputNum])
        inputMap[inputNum] = inputMap[inputNum].filter(id => id !== unitId)
      render()
    }

    function render() {
      if (inputMap === null) return
      renderDevices()
      renderInputs()
    }

    function renderDevices() {
      const sorted = [...units].sort((a, b) => (a.unitId ?? 99) - (b.unitId ?? 99))
      document.getElementById('devices-tbody').innerHTML = sorted.map(u => `
        <tr data-mac="${u.mac}">
          <td><code title="${u.mac}">${shortMac(u.mac)}</code></td>
          <td><input type="number" min="1" max="20" value="${u.unitId ?? ''}"
               class="uid-input" style="width:52px"></td>
          <td>
            <select class="role-sel">
              <option value="receiver" ${u.role !== 'bridge' ? 'selected' : ''}>Receiver</option>
              <option value="bridge"   ${u.role === 'bridge'  ? 'selected' : ''}>Bridge</option>
            </select>
          </td>
          <td>${u.online ? '🟢' : '⚫'} ${ago(u.lastSeen)}</td>
          <td>
            ${u.unitId ? '<button class="identify-btn" data-uid="' + u.unitId + '">Identify</button>' : ''}
            <button class="remove-device-btn" data-mac="${u.mac}" title="Remove device">✕</button>
          </td>
        </tr>`).join('')
      checkMultiBridge()
    }

    function inputRow(inputNum, assignedUids) {
      const name = inputNames[inputNum] || ('Input ' + inputNum)
      const provisioned = units.filter(u => u.unitId)

      const chips = assignedUids.map(uid =>
        '<span class="chip">Unit ' + uid +
        ' <button class="rm-btn" data-inp="' + inputNum + '" data-uid="' + uid + '" title="Remove">✕</button></span>'
      ).join('')

      const opts = provisioned
        .filter(u => !assignedUids.includes(u.unitId))
        .map(u => '<option value="' + u.unitId + '">Unit ' + u.unitId + '</option>')
        .join('')

      const addSel = opts
        ? '<select class="add-sel" data-inp="' + inputNum + '"><option value="">＋ assign unit</option>' + opts + '</select>'
        : ''

      return '<tr><td>' + inputNum + '</td><td>' + name + '</td><td>' + chips + addSel + '</td></tr>'
    }

    function renderInputs() {
      document.getElementById('inputs-tbody').innerHTML =
        Array.from({length: 8}, (_, i) => i + 1)
          .map(n => inputRow(n, inputMap[n] || [])).join('')

      const otherNums = new Set([
        ...Object.keys(inputNames).map(Number).filter(n => n > 8 && n < 1000),
        ...Object.keys(inputMap).map(Number).filter(n => n > 8 && (inputMap[n] || []).length > 0)
      ])
      const otherRows = [...otherNums].sort((a, b) => a - b)
        .map(n => inputRow(n, inputMap[n] || [])).join('')

      document.getElementById('other-tbody').innerHTML = otherRows
      document.getElementById('other-details').style.display = otherNums.size ? '' : 'none'
    }

    document.getElementById('devices-tbody').addEventListener('change', checkMultiBridge)

    document.getElementById('devices-tbody').addEventListener('click', e => {
      const identifyBtn = e.target.closest('.identify-btn')
      if (identifyBtn) socket.emit('identifyUnit', { unitId: Number(identifyBtn.dataset.uid) })

      const removeBtn = e.target.closest('.remove-device-btn')
      if (removeBtn) {
        const mac = removeBtn.dataset.mac
        const row = removeBtn.closest('tr[data-mac]')
        const unitId = row ? (Number(row.querySelector('.uid-input').value) || 0) : 0
        if (unitId) {
          for (const uids of Object.values(inputMap)) {
            const i = uids.indexOf(unitId)
            if (i >= 0) uids.splice(i, 1)
          }
        }
        units = units.filter(u => u.mac !== mac)
        socket.emit('removeDevice', { mac })
        render()
      }
    })

    document.addEventListener('change', e => {
      if (e.target.classList.contains('add-sel') && e.target.value)
        addToInput(Number(e.target.dataset.inp), Number(e.target.value))
    })

    document.addEventListener('click', e => {
      const btn = e.target.closest('.rm-btn')
      if (btn) removeFromInput(Number(btn.dataset.inp), Number(btn.dataset.uid))
    })

    function checkMultiBridge() {
      const n = [...document.querySelectorAll('.role-sel')].filter(s => s.value === 'bridge').length
      document.getElementById('bridge-warn').style.display = n > 1 ? '' : 'none'
    }

    document.getElementById('save-btn').addEventListener('click', () => {
      const unitInputMap = {}
      for (const [inp, uids] of Object.entries(inputMap))
        for (const uid of uids) unitInputMap[uid] = Number(inp)

      const assignments = []
      document.querySelectorAll('#devices-tbody tr[data-mac]').forEach(row => {
        const mac       = row.dataset.mac
        const unitId    = Number(row.querySelector('.uid-input').value) || 0
        const role      = row.querySelector('.role-sel').value
        const atemInput = unitId ? (unitInputMap[unitId] || 0) : 0
        assignments.push({ mac, unitId, role, atemInput })
      })

      socket.emit('saveAssignments', assignments)
      const msg = document.getElementById('saved-msg')
      msg.style.display = 'inline'
      setTimeout(() => msg.style.display = 'none', 2000)
    })
  </script>
</body>
</html>
