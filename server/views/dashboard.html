<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATEM Tally — Dashboard</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <nav>
    <a href="/" class="active">Dashboard</a>
    <a href="/assign">Assign</a>
    <a href="/settings">Settings</a>
  </nav>
  <div class="status-bar">
    <span><span class="dot" id="atem-dot"></span>ATEM: <span id="atem-status">–</span></span>
    <span><span class="dot" id="bridge-dot"></span>Bridge: <span id="bridge-status">–</span></span>
  </div>
  <div class="unit-grid" id="grid"></div>

  <div id="shutdown-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;">
    <div style="background:#1e1e1e;border:1px solid #444;border-radius:10px;padding:2rem;max-width:320px;text-align:center;">
      <p style="margin-bottom:1.5rem;font-size:1rem;">Shut down the tally server?</p>
      <div style="display:flex;gap:1rem;justify-content:center;">
        <button id="shutdown-cancel" style="background:#333;margin-top:0;">Cancel</button>
        <button id="shutdown-confirm" style="background:#dc2626;margin-top:0;">Shut Down</button>
      </div>
    </div>
  </div>

  <button id="shutdown-btn" style="position:fixed;bottom:1.5rem;right:1.5rem;background:#333;font-size:0.8rem;padding:0.5rem 1rem;margin-top:0;">&#9632; Shut Down Server</button>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
    let units = [], tally = {}, inputNames = {}

    function dotClass(status) {
      return status === 'connected' ? 'green' : status === 'connecting' ? 'amber' : 'red'
    }

    socket.on('atemStatus', s => {
      document.getElementById('atem-status').textContent = s
      document.getElementById('atem-dot').className = 'dot ' + dotClass(s)
    })
    socket.on('bridgeStatus', s => {
      document.getElementById('bridge-status').textContent = s
      document.getElementById('bridge-dot').className = 'dot ' + dotClass(s)
    })
    socket.on('inputNames', n => { inputNames = n; render() })
    socket.on('tally', data => { tally = data.states; render() })
    socket.on('units', u => { units = u; render() })

    function stateLabel(s) { return ['Standby','Preview','Program'][s] ?? '–' }
    function stateClass(s) { return ['','preview','program'][s] ?? '' }

    const modal = document.getElementById('shutdown-modal')
    document.getElementById('shutdown-btn').onclick = () => modal.style.display = 'flex'
    document.getElementById('shutdown-cancel').onclick = () => modal.style.display = 'none'
    document.getElementById('shutdown-confirm').onclick = async () => {
      await fetch('/api/shutdown', { method: 'POST' })
      document.body.innerHTML = '<p style="padding:2rem;color:#aaa">Server shut down. You can close this tab.</p>'
    }

    function render() {
      const grid = document.getElementById('grid')
      if (!units.length) { grid.innerHTML = '<p style="color:#666">No units seen yet.</p>'; return }
      const sorted = [...units].sort((a,b) => (a.unitId ?? 99) - (b.unitId ?? 99))
      grid.innerHTML = sorted.map(u => {
        const s = tally[String(u.unitId)] ?? 0
        const name = inputNames[u.atemInput] ?? (u.atemInput ? `Input ${u.atemInput}` : 'Unassigned')
        return `<div class="unit-card ${stateClass(s)} ${u.online ? '' : 'offline'}">
          <div class="uid">${u.unitId ?? '?'}</div>
          <div class="label">${name}</div>
          <div class="state">${u.online ? stateLabel(s) : 'Offline'}</div>
        </div>`
      }).join('')
    }
  </script>
</body>
</html>
