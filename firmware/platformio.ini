[platformio]
default_envs = tally

[env:tally]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3
    Links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^7.2.1

[env:native_test]
platform = native
build_src_filter = -<*>
